  --viz-series-4: light-dark(rgb(235 119 177), rgb(240 143 192));

  /* Internal implementation variables; not part of the agent contract. */
  --font-sans: -apple-system, system-ui, &quot;Segoe UI&quot;, sans-serif;
  --font-mono:

:root[data-theme=&quot;light&quot;] {
  color-scheme: light;
}

:root[data-theme=&quot;dark&quot;] {
  color-scheme: dark;
}

* {
  box-sizing: border-box;
}

html &gt; body {
  margin: 0;
  padding: 5px;
  color: var(--foreground);
  background: transparent !important;
  font-family: var(--font-sans);
  font-size: var(--font-size-normal);
  font-weight: var(--font-weight-normal);
  line-height: var(--line-height-normal);
}

a {
  color: color-mix(in srgb, var(--viz-accent) 80%, var(--viz-text) 20%);
  cursor: pointer;
  font-weight: var(--viz-font-weight-medium);
  text-decoration: none;
  text-underline-offset: 2px;
}

a:is(:hover, :focus-visible) {
  text-decoration-line: underline;
  text-decoration-style: dashed;
  text-decoration-thickness: 0.5px;
}

h1,
h2,
h3,
h4,
h5,
h6,
p {
  margin-block: 0;
}

h1 {
  font-size: var(--font-size-h1);
  font-weight: var(--font-weight-medium);
  line-height: 1.25;
}

h2 {
  font-size: var(--font-size-h2);
  font-weight: var(--font-weight-medium);
  line-height: 1.25;
}

h3,
h4,
h5,
h6 {
  font-size: var(--font-size-h3);
  font-weight: var(--font-weight-medium);
  line-height: 1.3;
}

b,
strong,
th {
  font-weight: var(--font-weight-medium);
}

code:not(pre code) {
  display: inline;
  padding: 1px 6px;
  border-radius: var(--radius-sm);
  corner-shape: superellipse(1.5);
  background: var(--muted);
  font-family: var(--font-mono);
  font-size: 0.92em;
  overflow-wrap: anywhere;
  -webkit-box-decoration-break: clone;
  box-decoration-break: clone;
  word-break: break-word;
}

#widget {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: 100%;
  padding: 0;
  background: transparent !important;
}

.card {
  min-width: 0;
  padding: 12px;
  overflow: hidden;
  overflow-wrap: break-word;
  border-radius: var(--radius-2xl);
  corner-shape: superellipse(1.5);
  color: var(--card-foreground);
  background: var(--card);
}

#widget &gt; :not(.card) {
  width: 100% !important;
  max-width: none !important;
  margin: 0 !important;
  padding: 0 !important;
  border: 0 !important;
  border-radius: 0 !important;
  background: transparent !important;
  box-shadow: none !important;
}

.tooltip {
  position: fixed;
  z-index: 50;
  top: 0;
  left: 0;
  width: max-content;
  max-width: min(
    20rem,
    var(--tooltip-available-width, calc(100vw - 10px)),
    calc(100vw - 10px)
  );
  max-height: min(
    var(--tooltip-available-height, calc(100vh - 10px)),
    calc(100vh - 10px)
  );
  padding: 4px 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  corner-shape: superellipse(1.5);
  color: var(--popover-foreground);
  background: var(--popover);
  box-shadow: none;
  font-size: var(--font-size-tooltip);
  line-height: var(--line-height-tooltip);
  overflow-wrap: break-word;
  white-space: normal;
  pointer-events: none;
  user-select: none;
}

.viz-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(max(180px, 24%), 1fr));
  gap: 10px;
}

.viz-stat {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.viz-stat-value {
  font-size: var(--font-size-h2);
  font-weight: var(--font-weight-medium);
  line-height: 1.25;
}

.viz-row {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 10px;
}

.viz-badge {
  padding: 3px 8px;
  border-radius: var(--radius-full);
  color: var(--accent-foreground);
  background: var(--accent);
  font-weight: var(--font-weight-medium);
}

small,
.text-small,
.viz-badge {
  font-size: var(--font-size-small);
  line-height: var(--line-height-small);
}

.text-muted {
  color: var(--muted-foreground);
}

.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

.viz-controls {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px;
}

.viz-controls &gt; .form-label {
  display: grid;
  min-width: min(100%, 260px);
  flex: 1 1 280px;
  grid-template-columns: minmax(0, 1fr) auto;
  align-items: baseline;
  gap: 2px 12px;
  margin-bottom: 0;
}

.viz-controls &gt; .form-label &gt; :is(.form-control, .form-range, .form-select) {
  grid-column: 1 / -1;
}

.btn,
.form-check-input,
.form-control,
.form-range,
.form-select {
  font: inherit;
}

.btn {
  appearance: button;
  display: inline-flex;
  inline-size: fit-content;
  max-inline-size: 100%;
  min-height: 28px;
  align-items: center;
  justify-content: center;
  gap: 4px;
  margin: 0;
  padding: 0 8px;
  -webkit-app-region: no-drag;
  border: 1px solid var(--input);
  border-radius: var(--radius-lg);
  corner-shape: superellipse(1.5);
  color: var(--secondary-foreground);
  background: var(--secondary);
  cursor: var(--cursor-interaction, pointer);
  text-align: center;
  text-decoration: none;
  white-space: nowrap;
  user-select: none;
  -webkit-font-smoothing: antialiased;
}

.btn:is(.btn-block, .viz-tile) {
  inline-size: 100%;
}

.btn.viz-tile {
  min-width: 0;
  overflow-wrap: anywhere;
  white-space: normal;
}

a.btn {
  cursor: pointer;
  text-decoration: none;
}

.btn:not(:disabled):hover {
  background: color-mix(in srgb, var(--foreground) 6%, var(--secondary));
}

.btn-primary {
  border-color: transparent;
  color: var(--primary-foreground);
  background: var(--foreground);
  background-clip: padding-box;
}

.btn-primary .text-muted {
  color: color-mix(in srgb, var(--primary-foreground) 50%, transparent);
}

.btn-primary:not(:disabled):hover {
  background: color-mix(in srgb, var(--foreground) 80%, transparent);
  background-clip: padding-box;
}

.btn-ghost {
  border-color: transparent;
  color: var(--muted-foreground);
  background: transparent;
}

.btn-ghost:not(:disabled):hover {
  color: var(--foreground);
  background: color-mix(in srgb, var(--foreground) 6%, var(--secondary));
}

.btn:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

[data-lucide] {
  stroke-width: 1.6;
}

.form-label {
  display: block;
  margin-bottom: 6px;
  color: var(--foreground);
}

.form-control {
  display: block;
  width: 100%;
  min-height: 28px;
  padding: 0 8px;
  outline: none;
  border: 1px solid var(--input);
  border-radius: var(--radius-lg);
  corner-shape: superellipse(1.5);
  color: var(--foreground);
  background: var(--secondary);
}

.form-control::placeholder {
  color: var(--muted-foreground);

.form-control[type=&quot;file&quot;] {
  padding: 0;
  overflow: hidden;
  cursor: var(--cursor-interaction, pointer);

.form-control[type=&quot;file&quot;]::file-selector-button {
  min-height: 26px;
  margin-right: 8px;
  padding: 0 8px;
  border: 0;
  border-right: 1px solid var(--input);
  color: var(--secondary-foreground);
  background: var(--secondary);
  cursor: inherit;
  font: inherit;
}

.form-control[type=&quot;file&quot;]:not(:disabled):hover::file-selector-button {
  background: color-mix(in srgb, var(--foreground) 6%, var(--secondary));
}

.form-control-color[type=&quot;color&quot;] {
  width: 40px;
  height: 28px;
  padding: 3px;
  cursor: var(--cursor-interaction, pointer);
}

.form-control-color[type=&quot;color&quot;]::-webkit-color-swatch-wrapper {
  padding: 0;
}

.form-control-color[type=&quot;color&quot;]::-webkit-color-swatch {
  border: 0;
  border-radius: calc(var(--radius-lg) - 4px);
  corner-shape: superellipse(1.5);
}

textarea.form-control {
  height: auto;
  min-height: 72px;
  padding: 8px 10px;
  resize: vertical;
}

.form-control:focus-visible {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-control:disabled,
.form-select:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.form-select {
  appearance: none;
  display: block;
  width: 100%;
  min-height: 28px;
  margin: 0;
  padding: 0 32px 0 8px;
  outline: none;
  border: 1px solid var(--input);
  border-radius: var(--radius-lg);
  corner-shape: superellipse(1.5);
  color: var(--foreground);
  background-color: var(--secondary);
  background-image:
    linear-gradient(45deg, transparent 50%, var(--muted-foreground) 50%),
    linear-gradient(135deg, var(--muted-foreground) 50%, transparent 50%);
  background-position:
    calc(100% - 14px) 50%,
    calc(100% - 10px) 50%;
  background-repeat: no-repeat;
  background-size: 4px 4px;
  cursor: var(--cursor-interaction, default);
}

.form-select:not(:disabled):hover {
  background-color: color-mix(in srgb, var(--foreground) 6%, var(--secondary));
}

.form-select:focus-visible {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-check {
  display: flex;
  min-height: 20px;
  align-items: center;
  gap: 6px;
}

.form-check-input {
  appearance: none;
  width: 14px;
  height: 14px;
  flex: 0 0 auto;
  margin: 0;
  border: 1px solid var(--input);
  color: var(--primary-foreground);
  background-color: transparent;
  cursor: var(--cursor-interaction, default);
  transition:
    background-color 150ms,
    border-color 150ms,
    box-shadow 150ms;
}

.form-check:not(.form-switch) .form-check-input[type=&quot;checkbox&quot;] {
  border-color: var(--input);
  border-radius: var(--radius-sm);
  corner-shape: superellipse(1.5);
  background-color: var(--secondary);
  box-shadow: var(--shadow-sm);
}

.form-check:not(.form-switch)
  .form-check-input:not(:disabled):not(:checked):hover {
  background-color: var(--card);
}

.form-check:not(.form-switch) .form-check-input[type=&quot;checkbox&quot;]:checked {
  border-color: var(--primary);
  background-color: var(--primary);
}

.form-check:not(.form-switch)
  .form-check-input[type=&quot;checkbox&quot;]:checked::before {
  display: block;
  width: 100%;
  height: 100%;
  background: var(--primary-foreground);
  content: &quot;&quot;;
  mask: var(--checkmark-image) center / 12px 12px no-repeat;
}

.form-check-input[type=&quot;radio&quot;] {
  width: 14px;
  height: 14px;
  border-radius: var(--radius-full);
}

.form-check-input[type=&quot;radio&quot;]:checked {
  border: 2px solid var(--primary);
  background:
    radial-gradient(circle, var(--primary-foreground) 0 2.5px, transparent 3px),
    var(--primary);
}

.form-check:not(.form-switch) .form-check-input:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

.form-check:not(.form-switch) .form-check-input:disabled {
  cursor: not-allowed;
  pointer-events: none;
}

.form-check:not(.form-switch) .form-check-input:disabled + .form-check-label {
  cursor: not-allowed;
}

.form-switch .form-check-input:disabled,
.form-switch .form-check-input:disabled + .form-check-label {
  cursor: not-allowed;
  opacity: 0.6;
}

.form-check-label {
  color: var(--foreground);
  cursor: var(--cursor-interaction, default);
}

.form-switch .form-check-input {
  position: relative;
  width: 32px;
  height: 20px;
  border: 0;
  border-radius: var(--radius-full);
  background: var(--muted);
  box-shadow: none;
  transition: background-color 200ms cubic-bezier(0, 0, 0.2, 1);
}

.form-switch .form-check-input::before {
  position: absolute;
  top: 50%;
  left: 0;
  width: 16px;
  height: 16px;
  box-sizing: border-box;
  border: 1px solid light-dark(var(--primary-foreground), var(--foreground));
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
  box-shadow: var(--shadow-sm);
  content: &quot;&quot;;
  transform: translate(2px, -50%);
  transition: transform 200ms cubic-bezier(0, 0, 0.2, 1);
}

.form-switch .form-check-input:checked {
  background: var(--primary);
}

.form-switch .form-check-input:checked::before {
  transform: translate(14px, -50%);
}

.form-switch .form-check-input:focus-visible {
  box-shadow: 0 0 0 2px var(--ring);
}

.form-range {
  appearance: none;
  display: block;
  width: 100%;
  height: 28px;
  flex: 1;
  margin: 0;
  padding: 0;
  outline: none;
  border: 0;
  accent-color: var(--primary);
  background: linear-gradient(
      color-mix(in srgb, var(--foreground) 7%, transparent),
      color-mix(in srgb, var(--foreground) 7%, transparent)
    )
    center / 100% 2px no-repeat;
}

.form-range::-webkit-slider-runnable-track {
  height: 28px;
  background: transparent;
}

.form-range::-webkit-slider-thumb {
  appearance: none;
  width: 20px;
  height: 20px;
  margin-top: 4px;

  &lt;div class=&quot;deck&quot;&gt;
    &lt;section class=&quot;slide active&quot; data-title=&quot;표지&quot; aria-hidden=&quot;false&quot;&gt;
      &lt;span class=&quot;slide-number&quot;&gt;01 / 14&lt;/span&gt;
      &lt;div&gt;
        &lt;p class=&quot;eyebrow&quot;&gt;Physics presentation&lt;/p&gt;
        &lt;h1&gt;빛의 속도,&lt;br&gt;&lt;span class=&quot;gradient-text&quot;&gt;시간, 그리고 블랙홀&lt;/span&gt;&lt;/h1&gt;
        &lt;div class=&quot;keyline&quot;&gt;&lt;/div&gt;
        &lt;p class=&quot;lead&quot;&gt;질량을 가진 물체는 왜 빛보다 빨라질 수 없을까?&lt;br&gt;그리고 강한 중력은 시간을 어떻게 바꿀까?&lt;/p&gt;
      &lt;/div&gt;
    &lt;/section&gt;

    &lt;section class=&quot;slide&quot; data-title=&quot;두 질문&quot; aria-hidden=&quot;true&quot;&gt;
      &lt;span class=&quot;slide-number&quot;&gt;02 / 14&lt;/span&gt;
      &lt;div&gt;
        &lt;p class=&quot;eyebrow&quot;&gt;two questions&lt;/p&gt;
        &lt;h2&gt;우리가 풀어볼&lt;br&gt;두 개의 질문&lt;/h2&gt;
        &lt;div class=&quot;question-grid&quot;&gt;
          &lt;article class=&quot;question&quot;&gt;
            &lt;span&gt;QUESTION 01&lt;/span&gt;
            &lt;strong&gt;빛보다 느리게 출발한 물체가, 빛보다 빨라질 수 있을까?&lt;/strong&gt;
          &lt;/article&gt;
          &lt;article class=&quot;question&quot;&gt;
            &lt;span&gt;QUESTION 02&lt;/span&gt;
            &lt;strong&gt;시간은 누구에게나 똑같은 속도로 흐를까?&lt;/strong&gt;
          &lt;/article&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/section&gt;

    &lt;section class=&quot;slide&quot; data-title=&quot;에너지와 속도&quot; aria-hidden=&quot;true&quot;&gt;
      &lt;span class=&quot;slide-number&quot;&gt;03 / 14&lt;/span&gt;
      &lt;div&gt;
        &lt;p class=&quot;eyebrow&quot;&gt;special relativity&lt;/p&gt;
        &lt;h2&gt;&lt;span class=&quot;gradient-text&quot;&gt;E = mc²&lt;/span&gt;는&lt;br&gt;정지해 있는 물체의 에너지&lt;/h2&gt;
        &lt;div class=&quot;two-up&quot;&gt;
          &lt;div&gt;
            &lt;p class=&quot;formula&quot;&gt;E&lt;sub&gt;0&lt;/sub&gt; = mc²&lt;/p&gt;
            &lt;p class=&quot;formula-note&quot;&gt;흔히 보는 식은 &lt;span class=&quot;emphasis&quot;&gt;정지 질량 m&lt;/span&gt;을 가진 물체의 정지 에너지입니다.&lt;/p&gt;
          &lt;/div&gt;
          &lt;div&gt;
            &lt;p class=&quot;formula&quot;&gt;E = γmc²&lt;/p&gt;
            &lt;p class=&quot;formula-note&quot;&gt;움직이는 물체에는 상대론적 인자 &lt;span class=&quot;emphasis&quot;&gt;γ&lt;/span&gt;가 더해집니다.&lt;/p&gt;
          &lt;/div&gt;
        &lt;/div&gt;
        &lt;p class=&quot;callout&quot;&gt;핵심은 “속도 자체가 c가 된다”가 아니라, &lt;strong&gt;v가 c에 가까워질수록 γ가 끝없이 커진다&lt;/strong&gt;는 점입니다.&lt;/p&gt;
      &lt;/div&gt;
    &lt;/section&gt;

    &lt;section class=&quot;slide&quot; data-title=&quot;무한한 에너지 장벽&quot; aria-hidden=&quot;true&quot;&gt;
      &lt;span class=&quot;slide-number&quot;&gt;04 / 14&lt;/span&gt;
      &lt;div&gt;
        &lt;p class=&quot;eyebrow&quot;&gt;the energy wall&lt;/p&gt;
        &lt;h2&gt;빛의 속도에 가까워질수록&lt;br&gt;필요한 에너지는 &lt;span class=&quot;gradient-text&quot;&gt;무한히 증가&lt;/span&gt;한다&lt;/h2&gt;
        &lt;p class=&quot;formula small&quot;&gt;γ = 1 / √(1 − v²/c²)&lt;/p&gt;
        &lt;div class=&quot;velocity-visual&quot; role=&quot;img&quot; aria-label=&quot;속도가 빛의 속도에 가까워질수록 에너지가 급격히 증가하는 곡선&quot;&gt;
          &lt;div class=&quot;velocity-axis&quot;&gt;&lt;/div&gt;
          &lt;div class=&quot;velocity-label&quot;&gt;속도 v&lt;/div&gt;
          &lt;div class=&quot;c-line&quot;&gt;&lt;span&gt;빛의 속도 c&lt;/span&gt;&lt;/div&gt;
          &lt;svg class=&quot;energy-curve&quot; viewBox=&quot;0 0 780 190&quot; preserveAspectRatio=&quot;none&quot; aria-hidden=&quot;true&quot;&gt;
            &lt;path d=&quot;M0,172 C160,172 315,170 430,159 C525,150 590,132 632,99 C665,73 683,42 696,5&quot;&gt;&lt;/path&gt;
            &lt;path class=&quot;arrow&quot; d=&quot;M693 16 L696 0 L682 9 Z&quot;&gt;&lt;/path&gt;
          &lt;/svg&gt;
          &lt;p class=&quot;curve-caption&quot;&gt;v → c 이면 분모 → 0&lt;br&gt;&lt;strong&gt;γ → ∞&lt;/strong&gt;&lt;/p&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/section&gt;

    &lt;section class=&quot;slide&quot; data-title=&quot;왜 질량은 c를 넘지 못하나&quot; aria-hidden=&quot;true&quot;&gt;
      &lt;span class=&quot;slide-number&quot;&gt;05 / 14&lt;/span&gt;
      &lt;div&gt;
        &lt;p class=&quot;eyebrow&quot;&gt;speed limit&lt;/p&gt;
        &lt;h2&gt;질량이 있는 물체는&lt;br&gt;&lt;span class=&quot;gradient-text&quot;&gt;c에 도달할 수 없다&lt;/span&gt;&lt;/h2&gt;
        &lt;div class=&quot;three-up&quot;&gt;
          &lt;article class=&quot;fact&quot;&gt;
            &lt;span&gt;01&lt;/span&gt;
            &lt;h3&gt;가속할수록&lt;/h3&gt;
            &lt;p class=&quot;lead&quot;&gt;에너지는 계속 늘어납니다.&lt;/p&gt;
          &lt;/article&gt;
          &lt;article class=&quot;fact&quot;&gt;
            &lt;span&gt;02&lt;/span&gt;
            &lt;h3&gt;c에 가까워질수록&lt;/h3&gt;
            &lt;p class=&quot;lead&quot;&gt;같은 속도 증가에 더 큰 에너지가 듭니다.&lt;/p&gt;
          &lt;/article&gt;
          &lt;article class=&quot;fact&quot;&gt;
            &lt;span&gt;03&lt;/span&gt;
            &lt;h3&gt;v = c라면&lt;/h3&gt;
            &lt;p class=&quot;lead&quot;&gt;필요 에너지가 무한대로 발산합니다.&lt;/p&gt;
          &lt;/article&gt;
        &lt;/div&gt;
        &lt;p class=&quot;callout&quot;&gt;따라서 무한한 에너지를 공급할 수 없는 한, 질량을 가진 물체가 빛의 속도를 넘는 경로는 없습니다.&lt;/p&gt;
      &lt;/div&gt;
    &lt;/section&gt;

    &lt;section class=&quot;slide&quot; data-title=&quot;광자는 왜 가능한가&quot; aria-hidden=&quot;true&quot;&gt;
      &lt;span class=&quot;slide-number&quot;&gt;06 / 14&lt;/span&gt;
      &lt;div&gt;
        &lt;p class=&quot;eyebrow&quot;&gt;massless light&lt;/p&gt;
        &lt;h2&gt;그렇다면 빛은&lt;br&gt;왜 &lt;span class=&quot;gradient-text&quot;&gt;c로 움직일까?&lt;/span&gt;&lt;/h2&gt;
        &lt;div class=&quot;two-up&quot;&gt;
          &lt;div class=&quot;photon-scene&quot; role=&quot;img&quot; aria-label=&quot;광자와 빛의 파동을 나타낸 그림&quot;&gt;
            &lt;div class=&quot;photon-ring&quot;&gt;&lt;/div&gt;
            &lt;div class=&quot;wave&quot;&gt;&lt;/div&gt;
          &lt;/div&gt;
          &lt;div&gt;
            &lt;p class=&quot;formula&quot;&gt;m&lt;sub&gt;0&lt;/sub&gt; = 0&lt;/p&gt;
            &lt;p class=&quot;formula-note&quot;&gt;광자는 &lt;span class=&quot;emphasis&quot;&gt;정지 질량이 0&lt;/span&gt;인 입자입니다. 가속해서 c에 이르는 것이 아니라, 진공에서 생성된 순간부터 c로 전파됩니다.&lt;/p&gt;
            &lt;p class=&quot;formula small&quot;&gt;E = pc&lt;/p&gt;
          &lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/section&gt;

    &lt;section class=&quot;slide&quot; data-title=&quot;중력의 새로운 그림&quot; aria-hidden=&quot;true&quot;&gt;
      &lt;span class=&quot;slide-number&quot;&gt;07 / 14&lt;/span&gt;
      &lt;div&gt;
        &lt;p class=&quot;eyebrow&quot;&gt;from force to geometry&lt;/p&gt;
        &lt;h2&gt;중력은 멀리서 당기는 힘일까,&lt;br&gt;아니면 &lt;span class=&quot;gradient-text&quot;&gt;시공간의 모양&lt;/span&gt;일까?&lt;/h2&gt;
        &lt;div class=&quot;timeline&quot;&gt;
          &lt;div class=&quot;year&quot;&gt;1687&lt;/div&gt;
          &lt;div class=&quot;copy&quot;&gt;&lt;strong&gt;뉴턴&lt;/strong&gt; — 질량을 가진 물체는 서로 끌어당긴다. 중력의 효과를 매우 정확하게 계산할 수 있다.&lt;/div&gt;
          &lt;div class=&quot;year&quot;&gt;1915&lt;/div&gt;
          &lt;div class=&quot;copy&quot;&gt;&lt;strong&gt;아인슈타인&lt;/strong&gt; — 질량과 에너지가 시공간을 휘게 하고, 물체는 그 휘어진 시공간을 따라 움직인다.&lt;/div&gt;
        &lt;/div&gt;
        &lt;p class=&quot;callout&quot;&gt;태양이 지구를 ‘줄로 잡아당긴다’기보다, 태양이 만든 &lt;strong&gt;기하학적 경로&lt;/strong&gt;를 지구가 따라가는 것으로 볼 수 있습니다.&lt;/p&gt;
      &lt;/div&gt;
    &lt;/section&gt;

    &lt;section class=&quot;slide&quot; data-title=&quot;시공간 곡률&quot; aria-hidden=&quot;true&quot;&gt;
      &lt;span class=&quot;slide-number&quot;&gt;08 / 14&lt;/span&gt;
      &lt;div&gt;
        &lt;p class=&quot;eyebrow&quot;&gt;curved spacetime&lt;/p&gt;
        &lt;h2&gt;질량과 에너지는&lt;br&gt;시공간의 &lt;span class=&quot;gradient-text&quot;&gt;측정자와 눈금&lt;/span&gt;을 바꾼다&lt;/h2&gt;
        &lt;div class=&quot;spacetime-visual&quot; role=&quot;img&quot; aria-label=&quot;질량 주위로 휘어진 시공간 격자&quot;&gt;
          &lt;svg viewBox=&quot;0 0 960 340&quot; preserveAspectRatio=&quot;none&quot; aria-hidden=&quot;true&quot;&gt;
            &lt;path d=&quot;M0 35 C220 35 315 35 380 86 C435 130 470 200 480 265 C490 200 525 130 580 86 C645 35 740 35 960 35&quot;&gt;&lt;/path&gt;
            &lt;path d=&quot;M0 92 C215 92 324 92 392 129 C441 157 469 215 480 275 C491 215 519 157 568 129 C636 92 745 92 960 92&quot;&gt;&lt;/path&gt;
            &lt;path d=&quot;M0 150 C225 150 340 150 410 171 C452 184 472 227 480 286 C488 227 508 184 550 171 C620 150 735 150 960 150&quot;&gt;&lt;/path&gt;
            &lt;path d=&quot;M0 208 C235 208 354 208 425 215 C460 219 476 243 480 296 C484 243 500 219 535 215 C606 208 725 208 960 208&quot;&gt;&lt;/path&gt;
            &lt;path d=&quot;M90 0 C90 98 124 148 250 183 C358 213 429 241 480 318 C531 241 602 213 710 183 C836 148 870 98 870 0&quot;&gt;&lt;/path&gt;
            &lt;path d=&quot;M245 0 C245 87 282 146 355 187 C416 220 456 256 480 328 C504 256 544 220 605 187 C678 146 715 87 715 0&quot;&gt;&lt;/path&gt;
            &lt;path d=&quot;M360 0 C360 90 391 151 430 204 C456 238 472 275 480 337 C488 275 504 238 530 204 C569 151 600 90 600 0&quot;&gt;&lt;/path&gt;

          &lt;div class=&quot;mass-orb&quot;&gt;&lt;/div&gt;
          &lt;p class=&quot;spacetime-caption&quot;&gt;그림은 비유입니다. 실제로 휘는 것은 3차원 공간만이 아니라 &lt;strong&gt;공간과 시간으로 이루어진 4차원 시공간&lt;/strong&gt;입니다.&lt;/p&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/section&gt;

    &lt;section class=&quot;slide&quot; data-title=&quot;슈바르츠실트 해&quot; aria-hidden=&quot;true&quot;&gt;
      &lt;span class=&quot;slide-number&quot;&gt;09 / 14&lt;/span&gt;
      &lt;div class=&quot;metric-layout&quot;&gt;
        &lt;div class=&quot;metric-copy&quot;&gt;
          &lt;p class=&quot;eyebrow&quot;&gt;schwarzschild solution&lt;/p&gt;
          &lt;h2&gt;구대칭 질량 바깥의&lt;br&gt;시공간을 푼 해&lt;/h2&gt;
          &lt;p class=&quot;formula small&quot;&gt;ds² = −(1 − r&lt;sub&gt;s&lt;/sub&gt;/r)c²dt² + (1 − r&lt;sub&gt;s&lt;/sub&gt;/r)&lt;sup&gt;−1&lt;/sup&gt;dr² + r²dΩ²&lt;/p&gt;
          &lt;p class=&quot;formula-note&quot;&gt;슈바르츠실트 메트릭은 &lt;span class=&quot;emphasis&quot;&gt;구형·비회전 질량&lt;/span&gt;의 바깥 시공간을 묘사합니다. 여기서 r&lt;sub&gt;s&lt;/sub&gt;는 특별한 반지름입니다.&lt;/p&gt;
          &lt;p class=&quot;formula small&quot;&gt;r&lt;sub&gt;s&lt;/sub&gt; = 2GM/c²&lt;/p&gt;
        &lt;/div&gt;
